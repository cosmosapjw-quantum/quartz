name: phase15-benchmark-gate

on:
  push:
    paths:
      - ".github/workflows/phase15-benchmark-gate.yml"
      - "scripts/phase15_benchmark.py"
      - "scripts/phase15_benchmark_ci_smoke.py"
      - "scripts/phase15_ablation_study.py"
      - "scripts/phase15_online_ablation.py"
      - "quartz/phase15_*.py"
      - "src/mcts_server.rs"
      - "src/mcts/mod.rs"
      - "tests/test_phase15_ablation.py"
      - "docs/ABLATION_GUIDE.md"
      - "docs/PHASE15_REEVALUATION.md"
      - "README.md"
      - "pyproject.toml"
  pull_request:
    paths:
      - ".github/workflows/phase15-benchmark-gate.yml"
      - "scripts/phase15_benchmark.py"
      - "scripts/phase15_benchmark_ci_smoke.py"
      - "scripts/phase15_ablation_study.py"
      - "scripts/phase15_online_ablation.py"
      - "quartz/phase15_*.py"
      - "src/mcts_server.rs"
      - "src/mcts/mod.rs"
      - "tests/test_phase15_ablation.py"
      - "docs/ABLATION_GUIDE.md"
      - "docs/PHASE15_REEVALUATION.md"
      - "README.md"
      - "pyproject.toml"

jobs:
  phase15-benchmark-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,torch]

      - name: Build Rust release binary
        run: cargo build --release

      - name: Run phase15 benchmark gate smoke
        run: |
          python scripts/phase15_benchmark_ci_smoke.py \
            --output results/phase15_ci_gate \
            --rust-binary ./target/release/mcts_demo

      - name: Upload phase15 benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase15-benchmark-gate
          path: results/phase15_ci_gate/**
          retention-days: 14
