[pytest]
# Pytest configuration for the AlphaZero project

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests that require GPU
    gpu_required: marks tests that require GPU (alias for gpu)
    cpu_only: marks tests that run only on CPU
    integration: marks integration tests
    contract: marks contract tests
    performance: marks performance benchmarks
    benchmark: marks benchmark tests (use with pytest-benchmark)
    training: marks training-related tests
    quick: marks quick tests for fast validation
    full_pipeline: marks full pipeline tests
    stress: marks stress tests
    sanitizer: marks sanitizer tests
    asan: marks AddressSanitizer tests
    tsan: marks ThreadSanitizer tests
    ubsan: marks UndefinedBehaviorSanitizer tests

# Test output
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings

# Minimum version
minversion = 7.0

# Coverage settings
[tool:coverage.run]
source = src
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */build/*
    */dist/*

[tool:coverage.report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod