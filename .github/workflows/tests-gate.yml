name: tests-gate

on:
  push:
    paths:
      - ".github/workflows/tests-gate.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "quartz/**"
      - "scripts/**"
      - "configs/idea_foundry*.json"
      - "configs/idea_lab*.json"
      - "docs/idea_foundry/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - ".github/workflows/tests-gate.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "quartz/**"
      - "scripts/**"
      - "configs/idea_foundry*.json"
      - "configs/idea_lab*.json"
      - "docs/idea_foundry/**"
      - "pyproject.toml"

jobs:
  rust-tests:
    name: cargo test --release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Run cargo test (release)
        run: |
          cargo test --release --locked
          cargo test --release --locked --features idea-foundry

  python-tests:
    name: pytest tests/
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Tests need torch for replay collation / QIPC batch protocol paths,
          # but not a GPU build — CPU wheel is sufficient for CI.
          python -m pip install -e .[dev] --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run pytest
        run: |
          python -m pytest -q tests/ \
            --ignore=tests/test_play_gui.py

  python-real-loop:
    name: real-loop smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build Rust binary
        run: cargo build --release --locked

      - name: Run real-loop smoke
        env:
          QUARTZ_FORCE_EAGER_EVAL: "1"
          QUARTZ_SAFE_RUNTIME: "1"
          QUARTZ_SAFE_BOOTSTRAP_TARGET_CAP: "2"
          QUARTZ_SAFE_SELFPLAY_PARALLEL_CAP: "1"
          QUARTZ_SAFE_SELFPLAY_BATCH_GAMES_CAP: "1"
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
        run: python -m pytest -q -m real_loop tests/test_real_loop_e2e.py
