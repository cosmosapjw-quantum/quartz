usage_example: |
  ```cpp
  class MCTSWithOptimizedInference {
      OptimizedInferencePipeline pipeline_;
      std::atomic<uint64_t> pending_requests_{0};

      void run_simulations(int num_threads, int num_sims) {
          // Start inference pipeline
          InferenceConfig config;
          config.max_batch_size = 64;
          config.timeout_ms = 1.0;
          pipeline_.initialize(config);

          // Launch simulation threads
          std::vector<std::thread> threads;
          for (int i = 0; i < num_threads; ++i) {
              threads.emplace_back([this, num_sims] {
                  run_thread_simulations(num_sims);
              });
          }

          // Process batches in main thread
          while (pending_requests_ > 0) {
              pipeline_.collect_and_process_batch();
          }
      }

      void run_thread_simulations(int num_sims) {
          for (int i = 0; i < num_sims; ++i) {
              // Select path
              auto [leaf, path] = select_leaf();

              // Submit for inference (non-blocking)
              auto request_id = pipeline_.submit_for_inference(
                  leaf->get_state(), leaf->index, path
              );
              pending_requests_++;

              // Continue with other work or wait
              auto result = pipeline_.wait_for_result(request_id);

              // Process result
              expand_node(result->node_index, result->policy);
              backup_value(result->path, result->value);
              pending_requests_--;
          }
      }
  };
  ```

testing_requirements:
  correctness:
    - Verify inference results match baseline
    - Test request-response matching
    - Validate thread safety with TSan

  performance:
    - Measure throughput vs batch size
    - Profile GPU utilization
    - Benchmark queue operations

  stress:
    - 24-hour continuous operation
    - Queue overflow handling
    - Memory leak detection

  edge_cases:
    - Single request latency
    - Maximum batch handling
    - Pipeline stalls recovery