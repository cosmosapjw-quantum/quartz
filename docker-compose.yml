services:
  train-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    shm_size: '8g'
    volumes:
      - ./models:/workspace/quartz/models
    command: python3 -m quartz.train --game gomoku7 --iterations 50

  train-cuda:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '8g'
    volumes:
      - ./models:/workspace/quartz/models
    command: python3 -m quartz.train --game gomoku7 --iterations 50
