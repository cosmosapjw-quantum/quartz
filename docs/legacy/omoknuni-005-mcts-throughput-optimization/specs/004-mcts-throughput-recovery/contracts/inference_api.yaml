# Optimized Inference Pipeline API Specification
# Version: 1.0.0

api_name: OptimizedInferencePipeline
description: |
  Complete inference pipeline with zero-copy tensors, lock-free queuing,
  and persistent Python thread for maximum throughput.

classes:
  OptimizedInferencePipeline:
    description: End-to-end optimized inference system

    constructor:
      parameters:
        - name: config
          type: InferenceConfig
          struct_definition: |
            struct InferenceConfig {
                std::string model_path;
                std::string device = "cuda:0";
                int max_batch_size = 64;
                int min_batch_size = 32;
                float timeout_ms = 1.0;
                bool use_mixed_precision = true;
                bool use_pinned_memory = true;
                size_t pinned_pool_size = 32 * 1024 * 1024;  // 32MB
            };

    methods:
      initialize:
        description: Initialize all pipeline components
        returns:
          type: bool
          description: True if initialization successful
        operations:
          - Create lock-free queue
          - Initialize DLPack bridge
          - Start persistent Python thread
          - Warm up GPU with dummy batch

      submit_for_inference:
        description: Submit single position for batched inference
        thread_safe: true
        parameters:
          - name: state
            type: std::unique_ptr<IGameState>
            description: Game state to evaluate
          - name: node_index
            type: NodeIndex
            description: Tree node being expanded
          - name: path
            type: std::vector<NodeIndex>
            description: Path from root to node
        returns:
          type: uint64_t
          description: Request ID for result retrieval

      collect_and_process_batch:
        description: Collect requests and process as batch
        thread_safe: true
        returns:
          type: int
          description: Number of requests processed
        implementation_flow: |
          1. Collect from lock-free queue (timeout or count)
          2. Create DLPack tensor (zero-copy)
          3. Submit to persistent Python thread
          4. Return results via lock-free queue

      get_result:
        description: Retrieve inference result (non-blocking)
        thread_safe: true
        parameters:
          - name: request_id
            type: uint64_t
            description: Request ID from submission
        returns:
          type: std::optional<InferenceResult>
          struct_definition: |
            struct InferenceResult {
                uint64_t request_id;
                std::vector<float> policy;
                float value;
                NodeIndex node_index;
                std::vector<NodeIndex> path;
            };

      wait_for_result:
        description: Wait for inference result (blocking)
        thread_safe: true
        parameters:
          - name: request_id
            type: uint64_t
          - name: timeout_ms
            type: int
            default: 100
        returns:
          type: std::optional<InferenceResult>

      get_metrics:
        description: Get pipeline performance metrics
        const: true
        returns:
          type: PipelineMetrics
          struct_definition: |
            struct PipelineMetrics {
                // Throughput
                uint64_t total_requests;
                uint64_t total_batches;
                double avg_batch_size;
                double requests_per_second;

                // Latency
                double avg_queue_time_ms;
                double avg_inference_time_ms;
                double avg_total_latency_ms;

                // Efficiency
                double gpu_utilization;
                double batch_efficiency;  // actual/max batch size
                uint64_t timeout_triggers;
                uint64_t size_triggers;
            };

  BatchCollector:
    description: Collects individual requests into efficient batches

    methods:
      collect_batch:
        description: Collect requests for batching
        parameters:
          - name: queue
            type: MPMCRingBuffer<InferenceRequest>&
          - name: min_size
            type: int
          - name: max_size
            type: int
          - name: timeout_ms
            type: float
        returns:
          type: std::vector<InferenceRequest>
        algorithm: |
          while (batch.size() < max_size) {
              if (batch.size() >= min_size && elapsed > timeout_ms) {
                  break;  // Timeout triggered
              }
              if (queue.try_dequeue(request)) {
                  batch.push_back(request);
              }
              if (batch.size() >= max_size) {
                  break;  // Size triggered
              }
          }

python_integration:
  worker_thread: |
    ```python
    class PersistentInferenceWorker:
        def __init__(self, config):
            # Never release GIL after this point
            self.model = torch.jit.load(config.model_path)
            self.model.eval()
            self.model = self.model.to(config.device)

            # Pre-allocate output buffers
            self.policy_buffer = torch.zeros(
                (config.max_batch_size, 225),  # Max moves
                device=config.device
            )
            self.value_buffer = torch.zeros(
                (config.max_batch_size, 1),
                device=config.device
            )

        def process_batch_dlpack(self, dlpack_tensor):
            # Zero-copy receive from C++
            input_tensor = torch.from_dlpack(dlpack_tensor)

            with torch.no_grad():
                if self.config.use_mixed_precision:
                    with torch.cuda.amp.autocast():
                        policy, value = self.model(input_tensor)
                else:
                    policy, value = self.model(input_tensor)

            return policy.cpu().numpy(), value.cpu().numpy()
    ```

performance_optimizations:
  zero_copy_path: |
    C++ GameState → DLPack (pinned) → PyTorch (GPU) → Results (pinned) → C++
    Total copies: 0 (only GPU transfers)

  batch_formation:
    strategy: "Dynamic batching with timeout"
    min_batch: 32  # Don't waste GPU on small batches
    max_batch: 64  # GPU memory limit
    timeout: 1ms   # Low latency when queue light

  pipeline_parallelism:
    - Request submission: Lock-free, wait-free
    - Batch collection: One dedicated thread
    - GPU inference: One persistent Python thread
    - Result distribution: Lock-free, wait-free

